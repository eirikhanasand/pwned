services:
  pwned:
    container_name: pwned
    image: pwned
    mem_limit: 1g
    cpus: "2.0"
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8201:8080"
    volumes:
      - ./passwords:/usr/src/app/passwords:ro
      - ./pwned:/usr/src/app/pwned:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/passwords/status >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - pwnednet

networks:
  pwnednet:
    external: true
